<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f7f4;
    color: #1a1a1a;
    padding: 16px;
    font-size: 14px;
  }
  h1 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 14px; }

  .stats {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat {
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 8px;
    padding: 10px 14px;
    flex: 1;
  }
  .stat-label { font-size: 11px; color: #888; margin-bottom: 2px; }
  .stat-value { font-size: 18px; font-weight: 600; color: #1a1a1a; }

  /* Category breakdown */
  .breakdown {
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 10px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .breakdown-header {
    padding: 9px 14px;
    background: #f0ede6;
    font-size: 12px;
    font-weight: 600;
    color: #555;
    border-bottom: 0.5px solid rgba(0,0,0,0.08);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .breakdown-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-bottom: 0.5px solid rgba(0,0,0,0.06);
  }
  .breakdown-row:last-child { border-bottom: none; }
  .cat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cat-name { flex: 1; font-size: 13px; }
  .cat-count { font-size: 11px; color: #888; margin-right: 8px; }
  .cat-amount { font-size: 13px; font-weight: 600; }
  .bar-wrap { flex: 2; height: 6px; background: rgba(0,0,0,0.07); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }

  /* Table */
  .table-wrap {
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 10px;
    overflow: hidden;
  }
  .table-header {
    display: grid;
    grid-template-columns: 80px 1fr 70px 1fr;
    padding: 8px 14px;
    background: #f0ede6;
    font-size: 11px;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-bottom: 0.5px solid rgba(0,0,0,0.08);
  }
  .table-row {
    display: grid;
    grid-template-columns: 80px 1fr 70px 1fr;
    padding: 8px 14px;
    border-bottom: 0.5px solid rgba(0,0,0,0.06);
    align-items: center;
    font-size: 12px;
  }
  .table-row:last-child { border-bottom: none; }
  .table-row:nth-child(even) { background: #fafaf8; }
  .amount-cell { font-weight: 600; color: #d9534f; }
  .note-cell { color: #888; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 600;
  }

  .no-data { text-align: center; padding: 40px 16px; color: #888; font-size: 13px; }

  @media (prefers-color-scheme: dark) {
    body { background: #1c1c1e; color: #e5e5e5; }
    h1 { color: #e5e5e5; }
    .stat { background: #2c2c2e; border-color: rgba(255,255,255,0.1); }
    .stat-value { color: #e5e5e5; }
    .breakdown, .table-wrap { background: #2c2c2e; border-color: rgba(255,255,255,0.1); }
    .breakdown-header, .table-header { background: #3a3a3c; border-color: rgba(255,255,255,0.08); color: #aaa; }
    .breakdown-row, .table-row { border-color: rgba(255,255,255,0.06); }
    .table-row:nth-child(even) { background: #313133; }
    .cat-name { color: #e5e5e5; }
    .note-cell { color: #888; }
  }
</style>
</head>
<body>
<h1>💰 Expense Tracker</h1>
<p class="subtitle" id="subtitle">All your recorded expenses</p>
<div class="stats" id="stats"></div>
<div class="breakdown" id="breakdown" style="display:none">
  <div class="breakdown-header">By Category</div>
  <div id="breakdown-rows"></div>
</div>
<div class="table-wrap" id="table-wrap" style="display:none">
  <div class="table-header">
    <span>Date</span><span>Category</span><span>Amount</span><span>Note</span>
  </div>
  <div id="table-rows"></div>
</div>
<div class="no-data" id="no-data" style="display:none">No expenses recorded yet.</div>

<script>
const PALETTE = ['#534AB7','#e76f51','#2a9d8f','#e9c46a','#f4a261','#264653','#a8dadc','#9b5de5','#f15bb5','#00bbf9'];

const params = new URLSearchParams(window.location.search);
const raw = params.get('data');

if (!raw) {
  document.getElementById('no-data').style.display = 'block';
} else {
  try {
    const expenses = JSON.parse(decodeURIComponent(raw));
    if (!expenses.length) {
      document.getElementById('no-data').style.display = 'block';
    } else {
      render(expenses);
    }
  } catch (e) {
    document.getElementById('no-data').textContent = 'Error: ' + e.message;
    document.getElementById('no-data').style.display = 'block';
  }
}

function render(expenses) {
  const total = expenses.reduce((s, e) => s + e.amount, 0);

  // Stats
  const statsEl = document.getElementById('stats');
  statsEl.innerHTML = `
    <div class="stat">
      <div class="stat-label">Total Spent</div>
      <div class="stat-value">₹${total.toFixed(2)}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Transactions</div>
      <div class="stat-value">${expenses.length}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Categories</div>
      <div class="stat-value" id="cat-count">–</div>
    </div>`;

  // Category grouping
  const catMap = {};
  expenses.forEach(e => {
    if (!catMap[e.category]) catMap[e.category] = { total: 0, count: 0 };
    catMap[e.category].total += e.amount;
    catMap[e.category].count++;
  });
  const cats = Object.entries(catMap).sort((a,b) => b[1].total - a[1].total);
  document.getElementById('cat-count').textContent = cats.length;

  const breakdownEl = document.getElementById('breakdown');
  const breakdownRows = document.getElementById('breakdown-rows');
  breakdownEl.style.display = 'block';
  breakdownRows.innerHTML = cats.map(([name, data], i) => {
    const pct = (data.total / total * 100).toFixed(0);
    const color = PALETTE[i % PALETTE.length];
    return `<div class="breakdown-row">
      <div class="cat-dot" style="background:${color}"></div>
      <span class="cat-name">${esc(name)}</span>
      <span class="cat-count">${data.count}x</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="cat-amount" style="color:${color};min-width:64px;text-align:right">₹${data.total.toFixed(2)}</span>
    </div>`;
  }).join('');

  // Build color map for badges
  const colorMap = {};
  cats.forEach(([name], i) => { colorMap[name] = PALETTE[i % PALETTE.length]; });

  // Table (newest first)
  const tableWrap = document.getElementById('table-wrap');
  const tableRows = document.getElementById('table-rows');
  tableWrap.style.display = 'block';
  const sorted = [...expenses].reverse();
  tableRows.innerHTML = sorted.map(e => {
    const color = colorMap[e.category] || '#888';
    const bg = color + '22';
    return `<div class="table-row">
      <span style="color:#888;font-size:11px">${esc(e.date)}</span>
      <span><span class="badge" style="background:${bg};color:${color}">${esc(e.category)}</span></span>
      <span class="amount-cell" style="color:${color}">₹${e.amount.toFixed(2)}</span>
      <span class="note-cell">${esc(e.note || '—')}</span>
    </div>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
